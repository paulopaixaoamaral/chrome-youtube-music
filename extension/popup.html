<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Music Downloader</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app">
    <!-- Header with tabs -->
    <header class="header">
      <h1 class="logo">YT Music</h1>
      <nav class="tabs">
        <button class="tab active" data-tab="download">Download</button>
        <button class="tab" data-tab="library">Library</button>
        <button class="tab" data-tab="settings">Settings</button>
      </nav>
    </header>

    <!-- Download tab -->
    <section class="panel active" id="panel-download">
      <div class="download-form">
        <label for="url-input">YouTube URL</label>
        <div class="input-row">
          <input type="url" id="url-input" placeholder="https://youtube.com/watch?v=..." autocomplete="off">
          <button id="btn-download" title="Download">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="downloads-list" class="downloads-list"></div>
      <div id="no-downloads" class="empty-state">
        <p>Paste a YouTube URL above to download as MP3.</p>
      </div>
    </section>

    <!-- Library tab -->
    <section class="panel" id="panel-library">
      <div id="library-list" class="library-list"></div>
      <div id="no-files" class="empty-state">
        <p>No files yet. Download some music first!</p>
      </div>
    </section>

    <!-- Settings tab -->
    <section class="panel" id="panel-settings">
      <div class="settings-form">
        <div class="field">
          <label for="output-dir">Output Directory</label>
          <input type="text" id="output-dir" placeholder="~/Music/YouTubeMusic">
        </div>
        <div class="field">
          <label for="server-port">File Server Port</label>
          <input type="number" id="server-port" placeholder="18932" min="1024" max="65535">
        </div>
        <button id="btn-save-settings" class="btn-primary">Save Settings</button>
        <div id="settings-status" class="settings-status"></div>
      </div>
      <div class="settings-info">
        <h3>Connection Status</h3>
        <p id="connection-status" class="status-badge disconnected">Checking...</p>
      </div>
    </section>

    <!-- Persistent player bar -->
    <footer class="player-bar" id="player-bar">
      <div class="player-track-info">
        <span id="player-title" class="player-title" title="">No track loaded</span>
      </div>
      <div class="player-controls">
        <button id="btn-prev" class="player-btn" title="Previous">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
        </button>
        <button id="btn-play-pause" class="player-btn play-btn" title="Play">
          <svg id="icon-play" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
          <svg id="icon-pause" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button id="btn-next" class="player-btn" title="Next">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="player-seek">
        <span id="time-current" class="time">0:00</span>
        <input type="range" id="seek-bar" min="0" max="100" value="0" step="0.1">
        <span id="time-total" class="time">0:00</span>
      </div>
      <div class="player-volume">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" id="volume-bar" min="0" max="1" value="0.8" step="0.01">
      </div>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
